stages:
  - build
  - docker
  - release

variables:
  BINARY_NAME: openai-converter
  GO_VERSION: "1.23"
  DOCKER_IMAGE: ${CI_REGISTRY_IMAGE}

build:
  stage: build
  image: golang:${GO_VERSION}-alpine
  script:
    - apk add --no-cache zip
    - mkdir -p dist

    # Linux AMD64
    - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/${BINARY_NAME}-linux-amd64 .

    # Linux ARM64
    - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/${BINARY_NAME}-linux-arm64 .

    # macOS AMD64 (Intel)
    - GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/${BINARY_NAME}-darwin-amd64 .

    # macOS ARM64 (Apple Silicon)
    - GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/${BINARY_NAME}-darwin-arm64 .

    # Windows AMD64
    - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags="-s -w" -o dist/${BINARY_NAME}-windows-amd64.exe .

    # 生成校验和
    - cd dist && sha256sum * > checksums.txt && cd ..

  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG

docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Build and push multi-arch images
    - docker buildx create --use --name multiarch --driver docker-container
    - |
      docker buildx build \
        --platform linux/amd64,linux/arm64 \
        --tag ${DOCKER_IMAGE}:${CI_COMMIT_TAG} \
        --tag ${DOCKER_IMAGE}:latest \
        --push .
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Creating release for ${CI_COMMIT_TAG}"
  release:
    tag_name: ${CI_COMMIT_TAG}
    name: "Release ${CI_COMMIT_TAG}"
    description: |
      ## Downloads

      | Platform | Architecture | File |
      |----------|-------------|------|
      | Linux | x86_64 | `${BINARY_NAME}-linux-amd64` |
      | Linux | ARM64 | `${BINARY_NAME}-linux-arm64` |
      | macOS | Intel | `${BINARY_NAME}-darwin-amd64` |
      | macOS | Apple Silicon | `${BINARY_NAME}-darwin-arm64` |
      | Windows | x86_64 | `${BINARY_NAME}-windows-amd64.exe` |
    assets:
      links:
        - name: "${BINARY_NAME}-linux-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-linux-amd64?job=build"
          link_type: package
        - name: "${BINARY_NAME}-linux-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-linux-arm64?job=build"
          link_type: package
        - name: "${BINARY_NAME}-darwin-amd64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-darwin-amd64?job=build"
          link_type: package
        - name: "${BINARY_NAME}-darwin-arm64"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-darwin-arm64?job=build"
          link_type: package
        - name: "${BINARY_NAME}-windows-amd64.exe"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/${BINARY_NAME}-windows-amd64.exe?job=build"
          link_type: package
        - name: "checksums.txt"
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/checksums.txt?job=build"
          link_type: other
  rules:
    - if: $CI_COMMIT_TAG